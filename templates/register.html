{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Регистрация</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                </form>
                <hr>
                <p class="text-center">
                    Уже есть аккаунт? <a href="{% url 'ads:login' %}">Войти</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
