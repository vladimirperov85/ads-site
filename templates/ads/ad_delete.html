{% extends 'base.html' %}

{% block title %}Удалить объявление{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h3 class="text-center">Удалить объявление</h3>
            </div>
            <div class="card-body">
                <p class="text-center">Вы уверены, что хотите удалить объявление "<strong>{{ ad.title }}</strong>"?</p>
                
                <div class="alert alert-warning text-center">
                    <small>Это действие нельзя отменить!</small>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100">Да, удалить</button>
                </form>
                <hr>
                <a href="{% url 'ads:ad_detail' pk=ad.pk %}" class="btn btn-outline-secondary w-100">Отмена</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
